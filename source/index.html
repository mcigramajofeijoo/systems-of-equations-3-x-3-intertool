        <h1>SLE – 3x3 · 3x3 System of Linear Equations Visualizer</h1>
        <p>
          SLE – 3x3 is a free interactive tool that visualizes and solves 3x3 systems of
          linear equations. Each equation in a, b and c is graphed as a plane in 3D space;
          the solver classifies the system live and shows its solution — a point where the
          three planes meet, a shared line or plane with infinitely many solutions, or no
          solution when the planes never meet — together with det(A) and the parametric form.
        </p>
        <p>This app requires JavaScript and WebGL to run.</p>
      </main>
